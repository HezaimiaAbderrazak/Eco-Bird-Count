kind = "web"
previewPath = "/"
title = "EcoBird Counter"
version = "1.0.0"
id = "artifacts/ecobird-counter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20632

[services.development]
run = "pnpm --filter @workspace/ecobird-counter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecobird-counter", "run", "build" ]
publicDir = "artifacts/ecobird-counter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20632"
BASE_PATH = "/"
